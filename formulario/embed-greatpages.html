<div class="outmat-form-iframe-wrap">
  <iframe
    class="outmat-form-iframe"
    src="https://seu-deploy.vercel.app"
    width="420"
    height="660"
    loading="lazy"
    scrolling="no"
    title="Formulario de parceria Outmat"
  ></iframe>
</div>

<style>
  .outmat-form-iframe-wrap {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }

  .outmat-form-iframe {
    display: block;
    width: 100%;
    min-height: 660px;
    border: 0;
    overflow: hidden;
  }
</style>

<script>
  (function() {
    'use strict';

    window.addEventListener('message', function(event) {
      if (!event.data || event.data.source !== 'outmat-formulario') return;

      if (event.data.type === 'wheel') {
        window.scrollBy({
          left: event.data.deltaX || 0,
          top: event.data.deltaY || 0,
          behavior: 'auto'
        });
      }

      if (event.data.type === 'resize') {
        var iframe = document.querySelector('.outmat-form-iframe');
        if (!iframe || !event.data.height) return;
        iframe.style.height = Math.max(660, Number(event.data.height)) + 'px';
      }

      if (event.data.type === 'redirect' && event.data.url) {
        window.location.href = event.data.url;
      }
    });
  })();
</script>
