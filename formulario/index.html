<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- deploy-refresh: formulario-root 2026-05-18 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Formulario de Parceria Outmat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="formulario-page">
    <div class="formulario-parceria-wrap">
      <div class="hero-proof-card" aria-hidden="true">
        <span>Outmat 360</span>
        <strong>Produto, instalacao e suporte em uma unica operacao.</strong>
        <small>500+ casas automatizadas</small>
      </div>

      <form class="lead-form" action="#" novalidate>
        <div class="form-heading">
          <p>Analise de parceria</p>
          <h1>Fale com um especialista Outmat</h1>
        </div>

        <div class="form-progress" aria-label="Progresso do formulario">
          <span class="is-active"></span>
          <span></span>
          <span></span>
        </div>

        <div class="form-scroll">
          <fieldset class="form-step is-active" data-step="0">
            <legend>Dados de contato</legend>

            <label>
              <span>Nome</span>
              <input type="text" name="nome" autocomplete="name" placeholder="Seu nome completo" required>
            </label>

            <label>
              <span>E-mail profissional</span>
              <input type="email" name="email" autocomplete="email" placeholder="seunome@exemplo.com" required>
            </label>

            <label>
              <span>Telefone</span>
              <input type="tel" name="telefone" autocomplete="tel" inputmode="numeric" placeholder="(11) 99999-9999" required>
            </label>
          </fieldset>

          <fieldset class="form-step" data-step="1" hidden>
            <legend>Perfil dos projetos</legend>

            <label>
              <span>Qual o seu segmento?</span>
              <select name="segmento" required>
                <option value="">Selecione</option>
                <option>Arquiteto(a)</option>
                <option>Designer de Interiores</option>
                <option>Construtora</option>
                <option>Engenheiro(a)</option>
                <option>Instalador-Integrador de Tecnologia</option>
                <option>Gestor de Hotelaria</option>
                <option>Property Manager (Airbnb)</option>
                <option>Cliente Final-Proprietario do Imovel</option>
                <option>Estudante-Outros</option>
              </select>
            </label>

            <label>
              <span>Volume de projetos</span>
              <select name="volume" required>
                <option value="">Selecione</option>
                <option>Projetos esporadicos</option>
                <option>Menos de 1 por mes</option>
                <option>1 a 2 projetos por mes</option>
                <option>3 a 5 projetos por mes</option>
                <option>Mais de 5 projetos por mes</option>
              </select>
            </label>

            <label>
              <span>Padrao dos projetos</span>
              <select name="padrao" required>
                <option value="">Selecione</option>
                <option>Popular-Economico (Ticket Obra menor que R$100k)</option>
                <option>Medio Padrao (R$100k a R$300k)</option>
                <option>Medio-Alto Padrao (R$300k a R$700k)</option>
                <option>Alto Padrao-Luxo (acima de R$700k)</option>
              </select>
            </label>
          </fieldset>

          <fieldset class="form-step" data-step="2" hidden>
            <legend>Necessidade atual</legend>

            <label>
              <span>Urgencia atual</span>
              <select name="urgencia" required>
                <option value="">Selecione</option>
                <option>Tenho um projeto agora e preciso de orcamento</option>
                <option>Tenho projetos futuros em fase de estudo</option>
                <option>Nao tenho projetos no momento, quero conhecer</option>
              </select>
            </label>

            <label>
              <span>O que voce espera dessa parceria?</span>
              <select name="expectativa" required>
                <option value="">Selecione</option>
                <option>Full Service (Produtos + Mao de Obra)</option>
                <option>Apenas fornecimento de produtos</option>
                <option>Apenas mao de obra (instalacao)</option>
                <option>Quero ser parceiro Outmat</option>
              </select>
            </label>
          </fieldset>
        </div>

        <div class="form-actions">
          <button class="form-back" type="button" disabled>Voltar</button>
          <button class="form-next" type="button">Continuar</button>
          <button class="submit-button" type="submit" hidden>Enviar</button>
        </div>
      </form>
    </div>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
